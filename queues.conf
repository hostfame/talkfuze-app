[general]
persistentmembers = no
autofill = yes
shared_lastcall = yes
log_membername_as_agent = yes

[talkfuze-support]
; Ring strategy: ringall = ring all available agents at once
strategy = ringall
; How long to ring each agent before cycling (seconds)
timeout = 20
; Time between ring cycles if nobody answered
retry = 5
; Max time a caller waits in queue (seconds) - 2 minutes
timeout = 120
; Wrap-up time after call ends before getting next call
wrapuptime = 5
; Don't ring agents already in use
ringinuse = no
; Music on hold class
musicclass = default
; Announce position in queue
announce-frequency = 30
announce-holdtime = yes
; Allow callers to join even if all agents offline
joinempty = yes
; Remove caller if all agents become unavailable
leavewhenempty = no
; Max callers waiting in queue
maxlen = 10
; Service level target (seconds) for stats
servicelevel = 30
; Weight - higher = higher priority queue
weight = 0

; Static queue members - all agents
member => PJSIP/agent_imran,0,Imran
member => PJSIP/agent_rafy,0,Rafy
member => PJSIP/agent_mujahid,0,Mujahid
member => PJSIP/agent_asad,0,Asad
member => PJSIP/agent_mahfuz,0,Mahfuz
member => PJSIP/agent_aisha,0,Aisha
member => PJSIP/talkfuze_agent,0,Legacy Agent
