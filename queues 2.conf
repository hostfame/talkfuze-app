[general]
persistentmembers = no
autofill = yes
shared_lastcall = yes
log_membername_as_agent = yes

[talkfuze-support]
strategy = ringall
; Ring each agent for 20 seconds per cycle
timeout = 20
; Retry ringing after 5 seconds gap
retry = 5
; Don't ring agents already on a call
ringinuse = no
; Wrap-up time after call ends
wrapuptime = 5
; Music on hold class
musicclass = default
; Max callers waiting
maxlen = 10
; Allow callers in even if all agents offline
joinempty = yes
; Keep caller in queue even if no agents available
leavewhenempty = no
; Service level for stats
servicelevel = 30

; Static queue members - all agents
member => PJSIP/agent_imran,0,Imran
member => PJSIP/agent_rafy,0,Rafy
member => PJSIP/agent_mujahid,0,Mujahid
member => PJSIP/agent_asad,0,Asad
member => PJSIP/agent_mahfuz,0,Mahfuz
member => PJSIP/agent_aisha,0,Aisha
member => PJSIP/talkfuze_agent,0,Legacy Agent
