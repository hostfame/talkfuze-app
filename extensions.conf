[general]
static=yes
writeprotect=no
clearglobalvars=no

[from-talkfuze]
; Intercept and rewrite numbers with +880 or 880 prefixes to standard local format (strip to leading 0)
exten => _+880.,1,NoOp(Rewriting +880 outbound call ${EXTEN})
 same => n,Goto(from-talkfuze,0${EXTEN:4},1)

exten => _880.,1,NoOp(Rewriting 880 outbound call ${EXTEN})
 same => n,Goto(from-talkfuze,0${EXTEN:3},1)

exten => _+0.,1,NoOp(Rewriting +0 outbound call ${EXTEN})
 same => n,Goto(from-talkfuze,${EXTEN:1},1)

exten => _+.,1,NoOp(Rewriting international call prefix ${EXTEN})
 same => n,Goto(from-talkfuze,${EXTEN:1},1)

; Outbound call handler
exten => _X.,1,NoOp(Outbound call to ${EXTEN} from ${CHANNEL(endpoint)})
 same => n,Set(GROUP(talkfuze)=agent_outbound)
 same => n,GotoIf($[${GROUP_COUNT(agent_outbound@talkfuze)} > 3]?spam)
 same => n,Set(RECORDING_FILE=${UNIQUEID}.wav)
 same => n,MixMonitor(/var/www/sip.talkfuze.com/recordings/${RECORDING_FILE})
 ; Set outbound Caller ID explicitly to DID to prevent carrier rejection and loops
 same => n,Set(CALLERID(num)=09617875955)
 same => n,Set(CALLERID(name)=09617875955)
 same => n,Dial(PJSIP/${EXTEN}@bdwebs,30)
 same => n,Hangup()

 same => n(spam),NoOp(Rate limit hit)
 same => n,Hangup(403)

exten => h,1,NoOp(Call ended. Firing webhook.)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" -H "x-webhook-secret: e58d7b1f868172449d6cf77214207cf8f2d5ea737df431f4696d4402194b27b3" -d '{"org_id":"ec2f8436-05dc-4621-8a7f-57202f865b8e","direction":"outbound","from":"09617875955","to":"${DIALEDPEERNUMBER}","duration":"${CDR(billsec)}","status":"${CDR(disposition)}","recording":"${RECORDING_FILE}"}' https://talkfuze-app.vercel.app/api/webhooks/calls)

[from-bdwebs]
; Inbound call matches only the registered DID to avoid loopbacks and scans
exten => 09617875955,1,Goto(inbound-handle,s,1)
exten => 8809617875955,1,Goto(inbound-handle,s,1)
exten => s,1,Goto(inbound-handle,s,1)
exten => _X.,1,NoOp(Ignoring mismatched inbound extension ${EXTEN} from ${CALLERID(num)})
 same => n,Hangup()

[inbound-handle]
exten => s,1,NoOp(Inbound call from ${CALLERID(num)} to TalkFuze)
 same => n,Set(RECORDING_FILE=IN-${CALLERID(num)}-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}.wav)
 same => n,MixMonitor(/var/www/sip.talkfuze.com/recordings/${RECORDING_FILE})
 ; Ring all active agents directly (t = let agent transfer, A(beep) = play whisper beep to agent)
 same => n,Dial(PJSIP/agent_imran&PJSIP/agent_rafy&PJSIP/agent_mujahid&PJSIP/agent_asad&PJSIP/agent_mahfuz&PJSIP/agent_aisha,60,tA(beep))
 same => n,Hangup()

exten => h,1,NoOp(Call ended. Firing webhook.)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" -H "x-webhook-secret: e58d7b1f868172449d6cf77214207cf8f2d5ea737df431f4696d4402194b27b3" -d '{"org_id":"ec2f8436-05dc-4621-8a7f-57202f865b8e","direction":"inbound","from":"${CALLERID(num)}","to":"09617875955","duration":"${CDR(billsec)}","status":"${CDR(disposition)}","recording":"${RECORDING_FILE}"}' https://talkfuze-app.vercel.app/api/webhooks/calls)
