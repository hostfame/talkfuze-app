[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
RECORDING_DIR=/var/spool/asterisk/monitor/

[from-internal]
; Intercept and rewrite numbers with +880 or 880 prefixes to start with 0
exten => _+880.,1,NoOp(Rewriting +880 outbound call ${EXTEN})
 same => n,Goto(from-internal,0${EXTEN:4},1)

exten => _880.,1,NoOp(Rewriting 880 outbound call ${EXTEN})
 same => n,Goto(from-internal,0${EXTEN:3},1)

exten => _+0.,1,NoOp(Rewriting +0 outbound call ${EXTEN})
 same => n,Goto(from-internal,${EXTEN:1},1)

; Fallback for other international formats (strip + prefix)
exten => _+.,1,NoOp(Rewriting international call ${EXTEN})
 same => n,Goto(from-internal,${EXTEN:1},1)

; Agent calling out via BDWebs
exten => _0.,1,NoOp(Outbound call to ${EXTEN})
 same => n,Set(START_TIME=${EPOCH})
 same => n,Set(DIALED_NUMBER=${EXTEN})
 same => n,Set(CALLFILENAME=${EXTEN}-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
 same => n,MixMonitor(${RECORDING_DIR}${CALLFILENAME}.wav,b)
 ; Set explicit outbound caller ID to prevent carrier dropping calls
 same => n,Set(CALLERID(num)=09617875955)
 same => n,Set(CALLERID(name)=09617875955)
 same => n,Dial(PJSIP/${EXTEN}@bdwebs-trunk,60,rT)
 same => n,StopMixMonitor()
 same => n,Hangup()

; Fallback for any digit dial patterns that don't start with 0 (e.g. 17595...)
exten => _[1-9].,1,NoOp(Outbound call to ${EXTEN} missing leading zero)
 same => n,Goto(from-internal,0${EXTEN},1)

exten => h,1,NoOp(Call ended - executing log script)
 same => n,Set(END_TIME=${EPOCH})
 same => n,Set(DURATION=$[${END_TIME} - ${START_TIME}])
 same => n,System(/usr/local/bin/log_call.sh "outbound" "${CALLERID(num)}" "${DIALED_NUMBER}" "${DURATION}" "${DIALSTATUS}" "${CALLFILENAME}.wav" "TalkFuze Agent" &)

[from-bdwebs]
; Inbound from BDWebs - match explicit DID to avoid loopbacks and scanners
exten => 09617875955,1,Goto(inbound-handle,s,1)
exten => 8809617875955,1,Goto(inbound-handle,s,1)

; Catch-all for mismatched calls (e.g. loopbacks or scanners)
exten => _X.,1,NoOp(Ignoring mismatched inbound extension ${EXTEN} from ${CALLERID(num)})
 same => n,Hangup()

[inbound-handle]
exten => s,1,NoOp(Inbound call from ${CALLERID(num)})
 same => n,Set(START_TIME=${EPOCH})
 same => n,Set(DIALED_NUMBER=09617875955)
 same => n,Set(CALLFILENAME=IN-${CALLERID(num)}-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
 same => n,MixMonitor(${RECORDING_DIR}${CALLFILENAME}.wav,b)
 same => n,Answer()
 same => n,Dial(PJSIP/agent_imran&PJSIP/agent_rafy&PJSIP/agent_mujahid&PJSIP/agent_asad&PJSIP/agent_mahfuz&PJSIP/agent_aisha,120,tm(ring))
 same => n,StopMixMonitor()
 same => n,Hangup()

exten => h,1,NoOp(Call ended - executing log script)
 same => n,Set(END_TIME=${EPOCH})
 same => n,Set(DURATION=$[${END_TIME} - ${START_TIME}])
 same => n,System(/usr/local/bin/log_call.sh "inbound" "${CALLERID(num)}" "${DIALED_NUMBER}" "${DURATION}" "${DIALSTATUS}" "${CALLFILENAME}.wav" "Client" &)

[hostnin-robocall]
exten => s,1,NoOp(Robocall answered by ${CALLERID(num)})
 same => n,Set(START_TIME=${EPOCH})
 same => n,Answer()
 same => n,Set(TIMEOUT(digit)=3)
 same => n,Set(TIMEOUT(response)=7)
 same => n,Set(LOOP_COUNT=0)
 same => n(playprompt),Set(LOOP_COUNT=$[${LOOP_COUNT} + 1])
 same => n,Background(recordings/hostnin_payment_reminder) ; Plays Bengali reminder
 same => n,WaitExten(7)
 same => n,GotoIf($[${LOOP_COUNT} < 2]?playprompt) ; Loop up to 2 times
 same => n,Hangup()

exten => 1,1,NoOp(Customer pressed 1 - transferring to agents)
 same => n,Playback(recordings/hostnin_transferring) ; Plays "Connecting to executive..."
 same => n,Dial(PJSIP/agent_imran&PJSIP/agent_rafy&PJSIP/agent_mujahid&PJSIP/agent_asad&PJSIP/agent_mahfuz&PJSIP/agent_aisha,120,tm(ring))
 same => n,Hangup()

exten => i,1,Playback(bad_cli_digit)
 same => n,Goto(s,playprompt)

exten => t,1,Hangup()

exten => h,1,NoOp(Robocall ended - executing log script)
 same => n,Set(END_TIME=${EPOCH})
 same => n,Set(DURATION=$[${END_TIME} - ${START_TIME}])
 same => n,System(/usr/local/bin/log_call.sh "outbound" "09617875955" "${DIALED_NUMBER}" "${DURATION}" "${DIALSTATUS}" "None" "Hostnin Autodialer" &)


