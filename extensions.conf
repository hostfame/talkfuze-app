[general]
static=yes
writeprotect=no

[globals]
TRUNK=PJSIP/bdwebs

[from-bdwebs]
; Incoming calls from BDWebs go to the TalkFuze agent
exten => _X.,1,NoOp(Incoming call from ${CALLERID(all)} to ${EXTEN})
exten => _X.,n,Dial(PJSIP/talkfuze_agent,30)
exten => _X.,n,Hangup()

[from-talkfuze]
; Outbound calls from TalkFuze WebRTC go to BDWebs
exten => _X.,1,NoOp(Outbound call from TalkFuze to ${EXTEN})
exten => _X.,n,Set(CALLERID(num)=09617875955)
exten => _X.,n,Dial(${TRUNK}/sip:${EXTEN}@202.40.176.2,30)
exten => _X.,n,Hangup()
