server {
    listen 80;
    server_name sip.talkfuze.com asterisk.talkfuze.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sip.talkfuze.com asterisk.talkfuze.com;

    ssl_certificate /etc/letsencrypt/live/sip.talkfuze.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sip.talkfuze.com/privkey.pem;

    location /ws {
        proxy_pass http://127.0.0.1:8088/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /recordings/ {
        alias /var/spool/asterisk/monitor/;
        autoindex on;
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
