; =========================================================
; WEBRTC ENDPOINT: TalkFuze Agent
; =========================================================
[talkfuze_agent]
type=aor
max_contacts=5
remove_existing=yes

[talkfuze_agent_auth]
type=auth
auth_type=userpass
password=talkfuze_secure_pass_123
username=talkfuze_agent

[talkfuze_agent]
