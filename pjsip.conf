[bdwebs_reg]
type=registration
outbound_auth=bdwebs_auth
server_uri=sip:202.40.176.2
client_uri=sip:09617875955@202.40.176.2
retry_interval=60
expiration=3600

[bdwebs_auth]
type=auth
auth_type=userpass
password=70f84ozm3bw
username=09617875955

[bdwebs]
type=aor
contact=sip:202.40.176.2:5060

[bdwebs]
type=endpoint
transport=transport-udp
context=from-bdwebs
disallow=all
allow=ulaw,alaw,gsm
