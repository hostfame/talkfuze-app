[global]
type=global
user_agent=TalkFuze PBX

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; =========================================================
; TRUNK: BDWebs (202.40.176.2)
; =========================================================
[bdwebs_reg]
type=registration
outbound_auth=bdwebs_auth
server_uri=sip:202.40.176.2
client_uri=sip:09617875955@202.40.176.2
retry_interval=60
expiration=3600

[bdwebs_auth]
type=auth
auth_type=userpass
password=70f84ozm3bw
username=09617875955

[bdwebs]
type=aor
contact=sip:202.40.176.2:5060

[bdwebs]
type=endpoint
transport=transport-udp
context=from-bdwebs
disallow=all
allow=ulaw,alaw,gsm
outbound_auth=bdwebs_auth
aors=bdwebs
from_user=09617875955
from_domain=202.40.176.2
direct_media=no

[bdwebs]
type=identify
endpoint=bdwebs
match=202.40.176.2

; =========================================================
; LEGACY: Shared TalkFuze Agent (fallback)
; =========================================================
[talkfuze_agent]
type=aor
max_contacts=5
remove_existing=yes

[talkfuze_agent_auth]
type=auth
auth_type=userpass
password=talkfuze_secure_pass_123
username=talkfuze_agent

[talkfuze_agent]
type=endpoint
aors=talkfuze_agent
auth=talkfuze_agent_auth
transport=transport-wss
context=from-talkfuze
disallow=all
allow=opus,ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_muc=yes
media_use_pt=yes
rtcp_mux=yes
direct_media=no

