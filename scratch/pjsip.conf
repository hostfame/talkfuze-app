;======================================================
; GLOBAL + TRANSPORTS
;======================================================
[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

;======================================================
; BDWEBS TRUNK (BDIX)
;======================================================
[bdwebs-trunk]
type=endpoint
transport=transport-udp
context=from-bdwebs
disallow=all
allow=ulaw
allow=alaw
outbound_auth=bdwebs-auth
aors=bdwebs-aor
direct_media=no
force_rport=yes
rtp_symmetric=yes
from_user=09617875955
from_domain=202.40.176.2

[bdwebs-auth]
type=auth
auth_type=userpass
username=09617875955
password=70f84ozm3bw

[bdwebs-aor]
type=aor
contact=sip:09617875955@202.40.176.2:5060
qualify_frequency=30

[bdwebs-registration]
type=registration
transport=transport-udp
outbound_auth=bdwebs-auth
server_uri=sip:202.40.176.2
client_uri=sip:09617875955@202.40.176.2
contact_user=09617875955
retry_interval=30
expiration=120
line=yes
endpoint=bdwebs-trunk

[bdwebs-identify]
type=identify
endpoint=bdwebs-trunk
match=202.40.176.2

